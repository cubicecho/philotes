services:
  philotes:
    build:
      context: ..
      dockerfile: philotes/Dockerfile
    image: vantreeseba/philotes:latest
    container_name: philotes
    restart: unless-stopped
    environment:
      # Required — generate with: openssl rand -hex 32
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_URL: ${APP_URL:-http://localhost:3001}
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: /data/pgdata
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - philotes-data:/data
      - philotes-avatars:/avatars

volumes:
  philotes-data:
    driver: local
  philotes-avatars:
    driver: local
